spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/edificio_app}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:change-me}
  jpa:
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}
  security:
    admin-username: ${APP_ADMIN_USERNAME:admin}
    admin-password: ${APP_ADMIN_PASSWORD:admin123}
    admin-email: ${APP_ADMIN_EMAIL:admin@edificio.local}
    jwt-secret: ${APP_JWT_SECRET:edificio-app-development-secret-key-32}
    jwt-expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:120}
    refresh-token-expiration-days: ${APP_REFRESH_TOKEN_EXPIRATION_DAYS:7}
    login-rate-limit:
      max-attempts: ${APP_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
      window-minutes: ${APP_LOGIN_RATE_LIMIT_WINDOW_MINUTES:1}
