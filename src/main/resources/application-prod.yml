spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
  security:
    admin-username: ${APP_ADMIN_USERNAME}
    admin-password: ${APP_ADMIN_PASSWORD}
    admin-email: ${APP_ADMIN_EMAIL}
    jwt-secret: ${APP_JWT_SECRET}
    jwt-expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:15}
    refresh-token-expiration-days: ${APP_REFRESH_TOKEN_EXPIRATION_DAYS:7}
    login-rate-limit:
      max-attempts: ${APP_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
      window-minutes: ${APP_LOGIN_RATE_LIMIT_WINDOW_MINUTES:1}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
