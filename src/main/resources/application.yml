spring:
  application:
    name: edificio-app
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/edificio_app}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

app:
  security:
    admin-username: ${APP_ADMIN_USERNAME:admin}
    admin-password: ${APP_ADMIN_PASSWORD}
    admin-email: ${APP_ADMIN_EMAIL:admin@edificio.local}
    jwt-secret: ${APP_JWT_SECRET}
    jwt-expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:120}
    refresh-token-expiration-days: ${APP_REFRESH_TOKEN_EXPIRATION_DAYS:7}
    login-rate-limit:
      max-attempts: ${APP_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
      window-minutes: ${APP_LOGIN_RATE_LIMIT_WINDOW_MINUTES:1}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
