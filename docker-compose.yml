services:
  postgres:
    image: postgres:16
    container_name: edificio_app_postgres
    environment:
      POSTGRES_DB: edificio_app
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
