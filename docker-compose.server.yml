services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: edificio_app
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d edificio_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/edificio_app
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MINUTES: ${APP_JWT_EXPIRATION_MINUTES:-15}
      APP_REFRESH_TOKEN_EXPIRATION_DAYS: ${APP_REFRESH_TOKEN_EXPIRATION_DAYS:-7}
      APP_LOGIN_RATE_LIMIT_MAX_ATTEMPTS: ${APP_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:-5}
      APP_LOGIN_RATE_LIMIT_WINDOW_MINUTES: ${APP_LOGIN_RATE_LIMIT_WINDOW_MINUTES:-1}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: edificio_app_server_postgres_data
  caddy_data:
    name: edificio_app_server_caddy_data
  caddy_config:
    name: edificio_app_server_caddy_config
